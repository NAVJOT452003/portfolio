<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Me - My Portfolio</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo"><span class="nav">Nav</span><span class="jot">jot</span></a>
        <button class="mobile-menu-btn">
            <ion-icon name="menu-outline"></ion-icon>
        </button>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="service.html">Services</a></li>
            <li><a href="Education.html">Education</a></li>
            <li><a href="Experience.html">Experience/Skills</a></li>
        </ul>
    </nav>

    <!-- Hire Me Section -->
    <section class="page-section">
        <div class="hire-container animate-on-scroll">
            <h2><span class="highlight-red">Hire </span><span class="highlight-black">Me</span></h2>
            <p style="text-align:center; color: #555;">Fill the form below to get in touch with me.</p>
            
            <form onsubmit="sendEmail(event, 'hire')">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>

                <button type="submit">Send Request</button>
            </form>
        </div>
    </section>

    <!-- Success Modal -->
    <div class="success-modal" id="success-modal">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <h3>Message Sent!</h3>
        <p>Your message has been successfully sent to Navjot.</p>
        <button class="close-modal-btn" onclick="closeModal()">Close</button>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></script>
    <script src="script.js"></script>
</body>

</html>
